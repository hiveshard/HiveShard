<div id="diagram">
    <div id="dag" style="width: 2200px; height: 900px;"></div>
</div>

<script src="https://unpkg.com/cytoscape@3.27.0/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/elkjs@0.11.0/lib/elk.bundled.js"></script>
<script src="https://unpkg.com/cytoscape-elk@2.3.0/dist/cytoscape-elk.js"></script>
<script src="https://unpkg.com/cytoscape-svg/cytoscape-svg.js"></script>
<script>
    
    if(!window.tick) 
        window.tick = 0;

    if(!window.step)
        window.step = 0;
    
    function dynamicHighlight(step) {
        if(step === window.step)
            return "highlighted"
        return ""
    }

    function dynamicBorderColor() {
        if(window.step === 0 || window.step === 2 || window.step === 6)
            return "rgb(2,143,171)"
        if(window.step === 1 || window.step === 3 || window.step === 5 || window.step === 7)
            return "rgb(157,45,45)"
        return "rgb(148,0,49)"
    }
    
    const elements = [
        { data: { id: "ticker_global_in", label: "Ticker (Global)", layer: 0 }, classes: "dticker " + dynamicHighlight(0) },
        { data: { id: "tick_global", label: "Tick " + window.tick + " (Global)", layer: 1 }, classes: "event " + dynamicHighlight(1) },

        { data: { id: "ticker_events_in", label: "Ticker (Events)", layer: 2 }, classes: "dticker " + dynamicHighlight(2) },
        { data: { id: "tick_events", label: "Tick " + window.tick + " (Events)", layer: 3 }, classes: "event " + dynamicHighlight(3) },

        { data: { id: "shards", label: "Shards", layer: 4 }, classes: "service " + dynamicHighlight(4) },

        { data: { id: "completed_events", label: "Completed " + window.tick + " (Events)", layer: 5 }, classes: "event " + dynamicHighlight(5) },

        { data: { id: "ticker_events_out", label: "Ticker (Events)", layer: 6 }, classes: "dticker " + dynamicHighlight(6) },

        { data: { id: "completed_global", label: "Completed " + window.tick + " (Global)", layer: 7 }, classes: "event " + dynamicHighlight(7) },


        { data: { id: "e1", source: "ticker_global_in", target: "tick_global" } },
        { data: { id: "e2", source: "tick_global", target: "ticker_events_in" } },
        { data: { id: "e3", source: "ticker_events_in", target: "tick_events" } },
        { data: { id: "e4", source: "tick_events", target: "shards" } },
        { data: { id: "e5", source: "shards", target: "completed_events" } },
        { data: { id: "e6", source: "completed_events", target: "ticker_events_out" } },
        { data: { id: "e7", source: "ticker_events_out", target: "completed_global" } },
    ];

    cytoscape.use(cytoscapeElk);

    window.layoutDone = false;
    const cy = cytoscape({
        container: document.getElementById('dag'),
        elements: elements,

        style: [
            {
                selector: 'node',
                style: {
                    label: 'data(label)',
                    'text-valign': 'center',
                    'text-halign': 'center',
                    'font-size': 18,
                    'font-family': 'Segoe UI, sans-serif',
                    'border-width': 0,
                    'background-color': '#252526',
                    'text-wrap': 'wrap',
                    'text-max-width': 180,
                    'color': '#0D1117',
                    'fill': "#0D1117",
                    'font-weight': "500",
                    'letter-spacing': "0.02em",
                }
            },
            {
                selector: '.service',
                style: {
                    shape: 'round-rectangle',
                    width: 200,
                    height: 40,
                    'background-color': '#3d0d2a',
                    color: "white",
                    'border-width': 3,
                    'border-color': 'rgb(128,0,40)',
                }
            },
            {
                selector: '.event',
                style: {
                    shape: 'ellipse',
                    width: 200,
                    height: 80,
                    color: 'white',
                    'background-color': '#330000',
                    'border-width': 3,
                    'border-color': 'rgb(126,37,37)',
                    'shadow-blur': 15,
                    'shadow-color': '#ff4d4d',
                    'shadow-opacity': 0.8
                }
            },
            {
                selector: '.dticker',
                style: {
                    shape: 'round-rectangle',
                    width: 160,
                    height: 60,
                    'background-color': '#001a33',
                    'border-width': 3,
                    'border-color': 'rgb(1,109,131)',
                    'color': '#ffffff',
                    'shadow-blur': 15,
                    'shadow-color': '#00d4ff',
                    'shadow-opacity': 0.8,
                    'shadow-offset-y': 0
                }
            },
            {
                selector: 'edge',
                style: {
                    width: 1.5,
                    'line-color': '#5a5a5a',
                    'target-arrow-color': '#5a5a5a',
                    'target-arrow-shape': 'triangle',
                    'curve-style': 'bezier'
                }
            },
            // HIGHLIGHTS
            {
                selector: '.highlighted',
                style: {
                    'border-color': dynamicBorderColor()
                }
            }
        ],

        layout: {
            name: 'elk',

            elk: {
                algorithm: 'layered',
                'elk.direction': 'DOWN',
                'elk.spacing.nodeNode': 40,
                'elk.layered.nodePlacement.strategy': 'BRANDES_KOEPF',
                'elk.layered.nodePlacement.bk.fixedAlignment': 'BALANCED'
            },
            transform: (node, pos) => {
                return { x: pos.x, y: node.data('layer') * 100 };
            }
        }

    });
    window.cy = cy;

    cy.on('layoutstop', () => {
        window.layoutDone = true;
    });
</script>
