<style>
    #diagram {
        display: grid;
        grid-template-columns: repeat(9, 100px);
        gap: 10px 10px;
        width: max-content;
        padding: 24px;
        font: 600 20px/1.2 system-ui, sans-serif;
    }

    .cell {
        border: 1px solid #cbd5e1;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
        text-align: center;
    }

    .title {
        display: grid;
        place-items: center;
        height: 60px;
        color: #334155;
        background: #f1f5f9;
        border-bottom: 1px solid #cbd5e1;
    }

    .bars {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        height: 40px;
    }

    .bars span {
        display: grid;
        place-items: center;
        border-right: 1px solid #cbd5e1;
        color: #0f172a;
    }

    .bars span:last-child {
        border-right: 0;
    }

</style>

<script>
    function getCoords(id) {
        const match = id.match(/\((-?\d+),(-?\d+)\)/);
        return match ? [parseInt(match[1]), parseInt(match[2])] : null;
    }

    function paintNeighboursB(cellId) {
        const coords = getCoords(cellId);
        if (!coords) return;

        const [x, y] = coords;

        for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
                const nx = x + dx;
                const ny = y + dy;

                const B = document.getElementById(`B_(${nx},${ny})`);
                if (!B) 
                    continue;

                B.style.background = "red";
            }
        }
    }

    function isPrime(n) {
        if (n < 2) return false;
        if (n % 2 === 0) return n === 2;
        for (let i = 3; i * i <= n; i += 2) {
            if (n % i === 0) return false;
        }
        return true;
    }

    function paintPrimeCells() {
        const cells = document.querySelectorAll("#diagram .cell");

        // determine bounds dynamically (no hardcoding)
        let xs = [], ys = [];
        cells.forEach(c => {
            const [x,y] = getCoords(c.id);
            xs.push(x); ys.push(y);
        });

        const minX = Math.min(...xs);
        const minY = Math.min(...ys);
        const width = Math.max(...xs) - minX + 1;

        cells.forEach(cell => {
            const [x,y] = getCoords(cell.id);

            // row-major index
            const index = (y - minY) * width + (x - minX);

            if (isPrime(index)) {
                cell.style.background = "black";
                cell.style.color = "white";

                // also hit children explicitly if needed
                cell.querySelectorAll("*").forEach(el => {
                    el.style.background = "black";
                    el.style.color = "white";
                });
            }
        });
    }

    function attachCellMouseHandlers() {
        const cells = document.querySelectorAll("#diagram .cell");

        cells.forEach(cell => {
            const a = cell.querySelector(".bars span:nth-child(1)");
            const b = cell.querySelector(".bars span:nth-child(2)");

            // left click → toggle A (blue)
            cell.addEventListener("click", (e) => {
                if (e.button !== 0) return;
                if (!a) return;

                a.style.background =
                    a.style.background === "blue" ? "" : "blue";
            });

            // right click → toggle B (red)
            cell.addEventListener("contextmenu", (e) => {
                e.preventDefault();
                if (!b) return;

                b.style.background =
                    b.style.background === "red" ? "" : "red";
            });
        });
    }
    function placeActor(cell, actor){
        let box = document.getElementById(`content_${cell}`);
        if(box.textContent !== "")
            box.textContent = box.textContent+"\n"+actor;
        else
            box.textContent = actor;
    }


    attachCellMouseHandlers();
    
    
    window.tick = 6;
    
    actor1 = "(0,0)"
    actor2 = "(0,0)"
    
    if(window.tick === 0){
        actor1 = "(-1,-2)"
        actor2 = "(3,3)"
    }
    if(window.tick === 1){
        actor1 = "(-1,-1)"
        actor2 = "(2,3)"
    }
    if(window.tick === 2){
        actor1 = "(-1,0)"
        actor2 = "(2,2)"
    }
    if(window.tick === 3){
        actor1 = "(-1,1)"
        actor2 = "(2,1)"
    }
    if(window.tick === 4){
        actor1 = "(0,1)"
        actor2 = "(3,1)"
    }
    if(window.tick === 5){
        actor1 = "(2,1)"
        actor2 = "(2,1)"
    }
    if(window.tick === 6){
        actor1 = "(2,0)"
        actor2 = "(1,1)"
    }



    placeActor(actor1, "Actor 1")
    paintNeighboursB(`${actor1}`);

    placeActor(actor2, "Actor 2")
    paintNeighboursB(`${actor2}`);

    paintPrimeCells();
    
</script>
