name: HiveShard CI

on: [push]

permissions:
  contents: write
  issues: write
  pull-requests: write
  checks: write
  
  
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: start services
        run: |
           docker compose -f docker-compose.ci.yaml up -d

      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Await Kafka
        run: dotnet run --project ./Util/KafkaStartupAwaiter/KafkaStartupAwaiter.csproj
          
      - name: run tests with coverage
        run: |
          dotnet test \
            --settings coverlet.runsettings \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"
        env:
          HIVESHARD_TELEMETRY_ENDPOINT: ${{ secrets.HIVESHARD_TELEMETRY_ENDPOINT }}
          HIVESHARD_TELEMETRY_TOKEN: ${{ secrets.HIVESHARD_TELEMETRY_TOKEN }}
          HIVESHARD_TELEMETRY_ORGANIZATION: ${{ secrets.HIVESHARD_TELEMETRY_ORGANIZATION }}
          HIVESHARD_TELEMETRY_PROJECT: ${{ secrets.HIVESHARD_TELEMETRY_PROJECT }}
          HIVESHARD_TELEMETRY_ENVIRONMENT_TYPE: ${{ secrets.HIVESHARD_TELEMETRY_ENVIRONMENT_TYPE }}

      - name: upload coverage
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: Tests/**/TestResults/**/coverage.cobertura.xml

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: ${{ !cancelled() }}
        with:
          name: .NET Tests
          path: "**/test-results.trx"
          reporter: dotnet-trx
               
  release:
    runs-on: ubuntu-latest
    needs: [tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g semantic-release @semantic-release/git @semantic-release/github @semantic-release/exec conventional-changelog-conventionalcommits
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'
          
      - run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}